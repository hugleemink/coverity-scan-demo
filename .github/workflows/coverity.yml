name: Coverity Scan — Static Analysis

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  coverity:
    name: Run Coverity SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc make wget curl

      - name: Download Coverity Tool
        run: |
          wget -q https://scan.coverity.com/download/linux64 \
            --post-data "token=${{ secrets.COVERITY_SCAN_TOKEN }}&project=hugleemink%2Fcoverity-scan-demo" \
            -O coverity_tool.tgz
          mkdir -p coverity_tool
          tar xzf coverity_tool.tgz --strip 1 -C coverity_tool

      - name: Configure Coverity for GCC
        run: |
          coverity_tool/bin/cov-configure --gcc

      - name: Build with Coverity
        run: |
          mkdir -p cov-int/tmp
          chmod -R 777 cov-int
          coverity_tool/bin/cov-build --dir cov-int make clean all

      - name: Submit to Coverity
        run: |
          tar czvf analysis.tgz cov-int
          curl \
            --form token=${{ secrets.COVERITY_SCAN_TOKEN }} \
            --form email=${{ secrets.COVERITY_EMAIL }} \
            --form file=@analysis.tgz \
            --form version="v1.0.0" \
            --form description="GitHub Actions build" \
            https://scan.coverity.com/builds?project=hugleemink%2Fcoverity-scan-demo
